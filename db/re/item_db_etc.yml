    AegisName: Barmund_Poison3
    Name: "瓦尔蒙特的水晶（毒） 3级"
    Type: Card
    SubType: Enchant
    Script: |
      .@g = getenchantgrade();
      bonus2 bMagicAddEle,Ele_Poison,10;
      bonus2 bAddEle,Ele_Poison,10;
      bonus2 bMagicAddEle,Ele_Neutral,10;
      bonus2 bAddEle,Ele_Neutral,10;
      if (.@g>=ENCHANTGRADE_D) {
         bonus2 bMagicAddEle,Ele_Poison,4;
         bonus2 bAddEle,Ele_Poison,4;
         bonus2 bMagicAddEle,Ele_Neutral,4;
         bonus2 bAddEle,Ele_Neutral,4;
         if (.@g>=ENCHANTGRADE_C) {
            bonus2 bMagicAddEle,Ele_Poison,4;
            bonus2 bAddEle,Ele_Poison,4;
            bonus2 bMagicAddEle,Ele_Neutral,4;
            bonus2 bAddEle,Ele_Neutral,4;
            if (.@g>=ENCHANTGRADE_B) {
               bonus2 bMagicAddEle,Ele_Poison,6;
               bonus2 bAddEle,Ele_Poison,6;
               bonus2 bMagicAddEle,Ele_Neutral,6;
               bonus2 bAddEle,Ele_Neutral,6;
               if (.@g>=ENCHANTGRADE_A) {
                  bonus2 bMagicAddEle,Ele_Poison,6;
                  bonus2 bAddEle,Ele_Poison,6;
                  bonus2 bMagicAddEle,Ele_Neutral,6;
                  bonus2 bAddEle,Ele_Neutral,6;
               }
            }
         }
      }
